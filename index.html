<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canale TV România - m3u8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-surface-2:#fbfbf9; --color-surface-offset:#f3f0ec;
      --color-border:#d4d1ca; --color-text:#28251d; --color-text-muted:#6e6b65; --color-text-inverse:#f9f8f4;
      --color-primary:#01696f; --color-primary-hover:#0c4e54; --color-primary-highlight:#cedcd8; --color-error:#a12c7b;
      --radius-md:.5rem; --radius-lg:.75rem; --radius-xl:1rem; --shadow-sm:0 1px 2px rgba(0,0,0,.06); --shadow-md:0 12px 32px rgba(0,0,0,.12);
      --space-2:.5rem; --space-3:.75rem; --space-4:1rem; --space-6:1.5rem; --space-8:2rem;
      --text-sm:.95rem; --text-base:1rem; --text-lg:1.15rem; --text-xl:clamp(1.5rem,1.2rem + 1vw,2.2rem);
      --font-body:'Inter',system-ui,sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-surface-offset:#22211f;
      --color-border:#393836; --color-text:#e4e2de; --color-text-muted:#aaa7a1; --color-text-inverse:#171614;
      --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#313b3b; --color-error:#d163a7;
      --shadow-sm:0 1px 2px rgba(0,0,0,.2); --shadow-md:0 12px 32px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.6;background:var(--color-bg);color:var(--color-text)}
    button,input{font:inherit;color:inherit}
    .app{max-width:1240px;margin:0 auto;padding:var(--space-4)}
    .topbar{display:flex;justify-content:space-between;gap:var(--space-4);align-items:flex-start;padding:var(--space-4) 0 var(--space-6)}
    .brand{display:flex;align-items:center;gap:var(--space-3)}
    .logo{width:42px;height:42px;border-radius:12px;background:var(--color-primary);color:var(--color-text-inverse);display:grid;place-items:center;box-shadow:var(--shadow-sm)}
    .brand h1{font-size:var(--text-xl);line-height:1}
    .brand p{color:var(--color-text-muted);font-size:var(--text-sm)}
    .theme-toggle{min-width:44px;min-height:44px;border:1px solid var(--color-border);background:var(--color-surface);border-radius:999px;padding:0 var(--space-4);cursor:pointer}
    .source-panel,.player-panel,.channels-panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
    .source-panel{padding:var(--space-4);margin-bottom:var(--space-6)}
    .source-grid{display:grid;grid-template-columns:1fr auto;gap:var(--space-3);align-items:end}
    .field label{display:block;font-size:var(--text-sm);font-weight:700;margin-bottom:.35rem}
    .input{width:100%;min-height:46px;padding:.85rem 1rem;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface-2)}
    .help{margin-top:.6rem;color:var(--color-text-muted);font-size:var(--text-sm)}
    .layout{display:grid;grid-template-columns:1.1fr .9fr;gap:var(--space-6)}
    .player-wrap,.channels-panel{padding:var(--space-4)}
    .video-shell{position:relative;background:#000;border-radius:calc(var(--radius-xl) - var(--space-4));overflow:hidden;box-shadow:var(--shadow-md);padding:var(--space-3)}
    video{width:100%;max-width:640px;margin:0 auto;aspect-ratio:16/9;background:#000;display:block;border-radius:calc(var(--radius-lg) - 2px)}
    video:fullscreen{max-width:none;width:100vw;height:100vh;aspect-ratio:auto;object-fit:contain;border-radius:0;background:#000}
    .overlay{position:absolute;inset:auto var(--space-4) var(--space-4) auto;display:flex;gap:var(--space-2)}
    .pill{padding:.45rem .8rem;border-radius:999px;background:rgba(0,0,0,.58);backdrop-filter:blur(10px);color:#fff;font-size:.82rem}
    .controls{display:flex;flex-wrap:wrap;gap:var(--space-3);padding-top:var(--space-4);margin-bottom:var(--space-4)}
    .btn{min-height:44px;padding:.8rem 1rem;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface-2);cursor:pointer}
    .btn-primary{background:var(--color-primary);color:var(--color-text-inverse);border-color:transparent}
    .btn-primary:hover{background:var(--color-primary-hover)}
    .status{padding-top:var(--space-3);color:var(--color-text-muted);font-size:var(--text-sm)}
    .error{color:var(--color-error)}
    .panel-head{display:flex;justify-content:space-between;align-items:end;gap:var(--space-4);padding-bottom:var(--space-4)}
    .panel-head h2{font-size:var(--text-lg)}
    .panel-head p{font-size:var(--text-sm);color:var(--color-text-muted)}
    .channel-list{display:grid;gap:var(--space-3)}
    .channel-btn{width:100%;text-align:left;padding:var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-surface-2);display:grid;gap:.2rem;cursor:pointer}
    .channel-btn .name{font-weight:700}
    .channel-btn .meta{font-size:var(--text-sm);color:var(--color-text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .channel-btn.active{background:var(--color-primary-highlight);border-color:color-mix(in srgb, var(--color-primary) 40%, var(--color-border))}
    .hint{margin-top:var(--space-4);padding:var(--space-4);border-radius:var(--radius-lg);background:var(--color-surface-offset);font-size:var(--text-sm);color:var(--color-text-muted)}
    @media (max-width:900px){.source-grid,.layout{grid-template-columns:1fr}video{max-width:100%}.topbar{align-items:flex-start}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-label="Logo TV"><svg aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="12" rx="3"></rect><path d="M8 20h8"></path><path d="M12 17v3"></path><path d="M7 2l5 3 5-3"></path></svg></div>
        <div><h1>Canale TV România</h1><p>Redare canale cu fișiere m3u8 staționare.</p></div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Schimbă tema">◐</button>
    </header>

    <main class="layout">
      <section class="player-panel">
        <div class="player-wrap">
          <div class="video-shell">
            <video id="video" controls autoplay muted playsinline></video>
            <div class="overlay">
              <span class="pill">LIVE</span>
              <span class="pill" id="currentChannel">Fără canal</span>
            </div>
          </div>
          <div class="controls">
            <button class="btn" id="muteBtn" type="button" title="Mutează/Dezmutează">Mutează</button>
            <button class="btn" id="fullscreenBtn" type="button" title="Maximizează videoclipul">Maximizează</button>
            <!-- Botón de recargar PÁGINA en rumano -->
            <button class="btn" id="reloadPageBtn" type="button">Reîncărcați pagina</button>
          </div>
          <p class="status" id="status">Selectează un canal.</p>
        </div>
      </section>

      <aside class="channels-panel">
        <div class="panel-head">
          <div><h2>Canale</h2><p>Listă fixă inclusă în cod.</p></div>
        </div>
        <div class="channel-list" id="channelList"></div>
      </aside>
    </main>
  </div>

  <script>
    const video           = document.getElementById('video');
    const statusEl        = document.getElementById('status');
    const currentChannelEl = document.getElementById('currentChannel');
    const listEl          = document.getElementById('channelList');
    const muteBtn         = document.getElementById('muteBtn');
    const fullscreenBtn   = document.getElementById('fullscreenBtn');
    const reloadPageBtn   = document.getElementById('reloadPageBtn');
    const themeToggle     = document.querySelector('[data-theme-toggle]');
    const root            = document.documentElement;

    const channels = [
      { name: 'Antena 1 HD', url: 'https://dai.google.com/linear/hls/pa/event/lntFTtOxQHqgDcnf6IyHHg/stream/9e941377-b328-439f-8986-f1d44610aaed:BRU/master.m3u8' },
      { name: 'Antena Stars HD', url: 'https://dai.google.com/linear/hls/pa/event/f_y14PC5R0Cxqus6Xy1-Kg/stream/06ee7afe-6ccc-4975-89d1-551631947cee:GRQ/master.m3u8' },
      { name: 'Kanal D SD', url: 'https://stream1.kanald.ro/iphone/knd-live_mid/index.m3u8' }
    ];

    let hls = null;
    let activeIndex = 0;
    let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.setAttribute('data-theme', theme);

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle('error', isError);
    }

    function updateMuteBtn() {
      muteBtn.textContent = video.muted ? 'Dezmutează' : 'Mutează';
    }

    function destroyPlayer() {
      if (hls) { hls.destroy(); hls = null; }
      video.removeAttribute('src');
      video.load();
    }

    function renderChannels() {
      listEl.innerHTML = channels.map((channel, index) => `
        <button class="channel-btn ${index === activeIndex ? 'active' : ''}" data-index="${index}" type="button" aria-pressed="${index === activeIndex}">
          <span class="name">${channel.name}</span>
          <span class="meta">${channel.url}</span>
        </button>
      `).join('');
      listEl.querySelectorAll('.channel-btn').forEach(btn => btn.addEventListener('click', () => loadChannel(Number(btn.dataset.index))));
    }

    function loadChannel(index) {
      activeIndex = index;
      renderChannels();
      destroyPlayer();
      const channel = channels[index];
      currentChannelEl.textContent = channel.name;
      setStatus(`Se încarcă ${channel.name}…`);

      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ enableWorker: true, lowLatencyMode: false, backBufferLength: 90 });
        hls.loadSource(channel.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          setStatus(`${channel.name} gata. Dacă nu pornește, apasă play.`);
          video.play().catch(() => setStatus(`${channel.name} gata. Apasă play pentru a porni.`));
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data && data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              setStatus(`Eroare de rețea în ${channel.name}. Puede estar bloqueado o caído.`, true);
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              setStatus(`Eroare media în ${channel.name}. Încerc să recuperăm…`, true);
              hls.recoverMediaError();
            } else {
              setStatus(`Nu s‑a putut reda ${channel.name}.`, true);
              destroyPlayer();
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = channel.url;
        video.addEventListener('loadedmetadata', () => {
          setStatus(`${channel.name} gata.`);
          updateMuteBtn();
          video.play().catch(() => setStatus(`${channel.name} gata. Apasă play pentru a porni.`));
        }, { once: true });
      } else {
        setStatus('Browserul tău nu suportă HLS.', true);
      }
    }

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      updateMuteBtn();
    });

    fullscreenBtn.addEventListener('click', () => {
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
      else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
      else if (video.msRequestFullscreen) video.msRequestFullscreen();
    });

    // Botón que recarga la PÁGINA completa
    reloadPageBtn.addEventListener('click', () => {
      location.reload();
    });

    themeToggle.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
    });

    updateMuteBtn();
    renderChannels();
    loadChannel(0);
  </script>
</body>
</html>
